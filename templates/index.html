<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .navbar { background-color: #1A56A0; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3 mb-4">
    <span class="navbar-brand fw-bold fs-4">💰 Student Expense Tracker</span>
</nav>

<div class="container">
    <div class="row">

        <!-- Add Expense Form -->
        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h5 class="mb-3 fw-bold">Add New Expense</h5>
                <form action="/add" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Lunch" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount (₹)</label>
                        <input type="number" name="amount" class="form-control" placeholder="e.g. 120" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select">
                            <option>Food</option>
                            <option>Transport</option>
                            <option>Study</option>
                            <option>Entertainment</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Add Expense</button>
                </form>
            </div>
        </div>

        <!-- Expenses List -->
        <div class="col-md-8">
            <div class="card p-4">
                <h5 class="mb-3 fw-bold">All Expenses</h5>
                {% if expenses %}
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Amount</th>
                            <th>Category</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for expense in expenses %}
                        <tr>
                            <td>{{ expense[0] }}</td>
                            <td>{{ expense[1] }}</td>
                            <td>₹{{ expense[2] }}</td>
                            <td><span class="badge bg-primary">{{ expense[3] }}</span></td>
                            <td><a href="/delete/{{ expense[0] }}" class="btn btn-sm btn-danger">Delete</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <p class="text-muted">No expenses yet. Add one!</p>
                {% endif %}
            </div>
        </div>

    </div>
</div>

</body>
</html>
